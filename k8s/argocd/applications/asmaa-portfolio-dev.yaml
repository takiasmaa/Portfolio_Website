apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asmaa-portfolio-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/takiasmaa/Portfolio_Website.git
    targetRevision: HEAD
    path: k8s/apps/asmaa-portfolio/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: resume-asmaa-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true