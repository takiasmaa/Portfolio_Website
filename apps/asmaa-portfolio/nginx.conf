server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the homepage HTML.
    location = / {
        try_files /index.html =404;

        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Never cache index.html.
    location = /index.html {
        try_files /index.html =404;

        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Static files may be cached because their URLs use release versions,
    # for example style.css?v=v20260711183232.
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|pdf)$ {
        try_files $uri =404;

        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Application routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}